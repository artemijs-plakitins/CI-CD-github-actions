name: Python Greetings Pipeline (Artemijs Plakitins 231RDB104)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:

  Install-pip-dependencies:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Installing dependencies
        run: echo Installing dependencies...
      - name: Run install coposite action
        uses: ./.github/actions/install_dependencies
        
  Deploying-to-Dev-Environment:
    runs-on: self-hosted
    needs: Install-pip-dependencies
    steps:
      - uses: actions/checkout@v4
      - name: Deploying to DEV environment
        run: echo Deploying to DEV environment
      - uses: ./.github/actions/deploy
        with:
          env: dev
          port: 7001

  tests-on-dev:
    runs-on: [self-hosted, windows]
    needs: Deploying-to-Dev-Environment
    steps:
      - uses: actions/checkout@v4
      - name: Testing on DEV environment
        run: echo Running tests on DEV environment
      - uses: ./.github/actions/test
        with:
          env: dev
