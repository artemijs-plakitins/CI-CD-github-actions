name: Python Greetings Pipeline (Artemijs Plakitins 231RDB104)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: python-greetings-${{ github.ref }}
  cancel-in-progress: true

jobs:

  install-pip-deps:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Installing dependencies
        run: echo Installing dependencies...
      - name: Run install coposite action
        uses: ./.github/actions/install_dependencies
        
  deploy-to-dev:
    runs-on: self-hosted
    needs: install-pip-deps
    steps:
      - uses: actions/checkout@v6
      - name: Deploying to DEV environment
        run: echo Deploying to DEV environment
      - uses: ./.github/actions/deploy
        with:
          env: dev
          port: 7001

  tests-on-dev:
    name: tests-on-dev
    runs-on: self-hosted
    needs: deploy-to-dev
    steps:
      - name: Running tests on DEV
        run: echo Running tests on DEV
      - name: Run test composite action
        uses: ./.github/actions/test
        with:
          env: dev
