  deploy-to-stg:
    name: deploy-to-stg
    runs-on: self-hosted
    needs: deploy-to-dev # tests-on-dev !!!
    steps:
      - name: Deploying application to STG
        run: echo Deploying application to STG
      - name: Run deploy composite action
        uses: ./.github/actions/deploy
        with:
          env: stg
          port: "7002"

