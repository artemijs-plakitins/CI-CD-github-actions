  deploy-to-prod:
    name: deploy-to-prod
    runs-on: self-hosted
    needs: deploy-to-preprod # tests-on-preprod
    steps:
      - name: Deploying application to PROD
        run: echo Deploying application to PROD
      - name: Run deploy composite action
        uses: ./.github/actions/deploy
        with:
          env: prod
          port: "7004"

