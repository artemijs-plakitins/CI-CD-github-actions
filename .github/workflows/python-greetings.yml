  deploy-to-preprod:
    name: deploy-to-preprod
    runs-on: self-hosted
    needs: deploy-to-stg # tests-on-stg
    steps:
      - name: Deploying application to PREPROD
        run: echo Deploying application to PREPROD
      - name: Run deploy composite action
        uses: ./.github/actions/deploy
        with:
          env: preprod
          port: "7003"

  # tests-on-preprod:
