name: Python Greetings Pipeline (Artemijs Plakitins 231RDB104)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  install-pip-deps:
    name: install-pip-deps
    runs-on: self-hosted
    steps:
      - name: Installing all required dependencies
        run: echo Installing all required dependencies
      - name: Run install composite action
        uses: ./.github/actions/install_dependencies

  deploy-to-dev:
    name: deploy-to-dev
    runs-on: self-hosted
    needs: install-pip-deps
    steps:
      - name: Deploying application to DEV
        run: echo Deploying application to DEV
      - name: Run deploy composite action
        uses: ./.github/actions/deploy
        with:
          env: dev
          port: "7001"

  # tests-on-dev:
