name: Deploying App

description: Deploying python-greetings app (pm2)

inputs:
  env:
    required: true
  port:
    required: true

runs:
  using: "composite"
  steps:

    - name: Checkout main repository
      uses: actions/checkout@v4
      
    - name: Clone python-greetings repository
      uses: actions/checkout@v4
      with:
        repository: mtararujs/python-greetings
        path: greetings

    - name: Setup virtual environment
      shell: cmd
      working-directory: greetings
      run: |
        python -m venv venv
        venv\Scripts\python.exe -m pip install -r requirements.txt

    - name: Stop existing app
      shell: cmd
      run: |
        echo Stopping old app
        pm2 delete greetings-app-${{ inputs.env }} & set "errorlevel=0"

    - name: Start app (FLASK)
      shell: cmd
      working-directory: greetings
      run: |
        echo Starting Flask app on port ${{ inputs.port }}...
        set FLASK_APP=app.py
        set FLASK_ENV=development
        set PORT=${{ inputs.port }}
        start "" cmd /c "venv\Scripts\flask run --host=0.0.0.0 --port=${{ inputs.port }}"   
