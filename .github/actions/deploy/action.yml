name: Deploy App
description: Deploying app with pm2

inputs:
  env:
    required: true
  port:
    required: true

runs:
  using: "composite"
  steps:

    - uses: actions/checkout@v6

    - name: Clone python-greetings repo
      uses: actions/checkout@v6
      with:
        repository: mtararujs/python-greetings
        path: greetings

    - name: Setup virtual environment
      shell: cmd
      working-directory: greetings
      run: |
        python -m venv venv
        venv\Scripts\python.exe -m pip install -r requirements.txt

    - name: Stop existing app
      shell: cmd
      run: |
        pm2 delete greetings-app-${{ inputs.env }} & set "errorlevel=0"

    - name: Start app
      shell: cmd
      working-directory: greetings
      run: |
        echo Starting app on port ${{ inputs.port }}...
        pm2 start venv\Scripts\python.exe --name greetings-app-${{ inputs.env }} -- app.py --port ${{ inputs.port }}

    - name: Show PM2 process list
      shell: cmd
      run: |
        echo Showing PM2 process list...
        pm2 list

    - name: Wait for app startup
      shell: cmd
      run: |
        echo Waiting for app to start...
        timeout /t 5 /nobreak

    - name: Check app health
      shell: powershell
      run: |
        Write-Host "Checking http://127.0.0.1:${{ inputs.port }}/greetings"
        Invoke-WebRequest -Uri "http://127.0.0.1:${{ inputs.port }}/greetings" -UseBasicParsing

    - name: Show PM2 logs if needed
      if: always()
      shell: cmd
      run: |
        echo Showing PM2 logs...
        pm2 logs greetings-app-${{ inputs.env }} --lines 30 --nostream
